# Kinematics configuration for desk_cleaner (UR5e + Robotiq 2F-85)
# 
# This file configures inverse kinematics (IK) solvers for each planning group.
# IK is used by MoveIt to find joint configurations that reach target end effector poses.
#
# For arm planning, we use:
#   - UR5e has closed-form IK provided by ur_kinematics plugin
#   - Fallback: Numerical IK if closed-form unavailable
#
# For gripper planning:
#   - Linear/analytical IK for simple joint space targets
#

ur_manipulator:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  position_only_ik: false
  
robotiq_gripper:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  position_only_ik: false

